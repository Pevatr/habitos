<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a3a0a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feGaussianBlur stdDeviation="16" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGlow)"/>

  <!-- Outer glow blob -->
  <ellipse cx="256" cy="260" rx="180" ry="170" fill="#00cc00" opacity="0.06"/>

  <!-- Calendar body outer glow -->
  <rect x="88" y="140" width="336" height="300" rx="44" ry="44"
        fill="none" stroke="#00ff44" stroke-width="18" opacity="0.25" filter="url(#neonGlow)"/>

  <!-- Calendar body -->
  <rect x="96" y="148" width="320" height="284" rx="38" ry="38"
        fill="#001a00" stroke="#44ff66" stroke-width="5" filter="url(#softGlow)"/>

  <!-- Header line glow -->
  <line x1="96" y1="218" x2="416" y2="218" stroke="#00ff44" stroke-width="6" opacity="0.3" filter="url(#neonGlow)"/>
  <!-- Header line -->
  <line x1="96" y1="218" x2="416" y2="218" stroke="#44ff66" stroke-width="3"/>

  <!-- Ring left outer glow -->
  <rect x="166" y="110" width="44" height="56" rx="14" ry="14"
        fill="none" stroke="#00ff44" stroke-width="12" opacity="0.3" filter="url(#neonGlow)"/>
  <!-- Ring left -->
  <rect x="170" y="114" width="36" height="48" rx="11" ry="11"
        fill="#001a00" stroke="#44ff66" stroke-width="4.5"/>

  <!-- Ring right outer glow -->
  <rect x="302" y="110" width="44" height="56" rx="14" ry="14"
        fill="none" stroke="#00ff44" stroke-width="12" opacity="0.3" filter="url(#neonGlow)"/>
  <!-- Ring right -->
  <rect x="306" y="114" width="36" height="48" rx="11" ry="11"
        fill="#001a00" stroke="#44ff66" stroke-width="4.5"/>

  <!-- Checkmark outer glow -->
  <polyline points="158,295 228,368 370,240"
            fill="none" stroke="#00ff44" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"
            opacity="0.3" filter="url(#neonGlow)"/>
  <!-- Checkmark mid glow -->
  <polyline points="158,295 228,368 370,240"
            fill="none" stroke="#44ff88" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"
            opacity="0.5"/>
  <!-- Checkmark main -->
  <polyline points="158,295 228,368 370,240"
            fill="none" stroke="#aaffbb" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"
            filter="url(#softGlow)"/>
</svg>
